services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
